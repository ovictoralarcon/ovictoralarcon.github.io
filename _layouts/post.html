---
layout: default
---

<article class="post-single">
  <div class="container container--narrow">

    <header class="post-header">
      <div class="post-meta">
        <span class="label">{{ page.date | date: "%d %b %Y" | upcase }}</span>
        {% if page.category %}<span class="label">{{ page.category | upcase }}</span>{% endif %}
      </div>
      <h1 class="post-title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
    </header>

    <div class="post-body">
      {{ content }}
    </div>

    <footer class="post-footer">
      <a href="{{ '/textos/' | relative_url }}" class="back-link">← Textos</a>
    </footer>

  </div>
</article>
